[build]
  base    = "."
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"
  NEXT_PUBLIC_API_URL = "https://labourbackend-1.onrender.com"
  NEXT_PUBLIC_WS_URL  = "https://labourbackend-1.onrender.com"
  NEXT_PUBLIC_RAZORPAY_KEY = "rzp_live_SRVzzcULeXSVOl"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
